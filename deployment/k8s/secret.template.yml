# secret.template.yml
# Copy this file to secret.yml and fill in base64 encoded values
# Never commit secret.yml to GitHub
# Generate base64: echo -n "yourvalue" | base64
apiVersion: v1
kind: Secret
metadata:
  name: library-secret
  namespace: library-management
type: Opaque
data:
  MYSQL_ROOT_PASSWORD: <base64-encoded-root-password>
  MYSQL_USER: <base64-encoded-username>
  MYSQL_PASSWORD: <base64-encoded-password>
  DB_URL: <base64-db-url>
  MYSQL_DATABASE: <base64-database-name>