name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD:
          MYSQL_DATABASE: library_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      # Step 1 - Get the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 - Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Step 3 - Make wrapper executable (Important for Linux runner)
      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      # Step 4 - Run tests
      - name: Run tests
        run: ./mvnw test

      # Step 5 - Build the app
      - name: Build
        run: ./mvnw clean package -DskipTests